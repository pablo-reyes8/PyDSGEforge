repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff check
        entry: python -m ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: Ruff format
        entry: python -m ruff format
        language: system
        types: [python]
      - id: tests
        name: Fast test suite
        entry: python -m pytest -q
        language: system
        pass_filenames: false
