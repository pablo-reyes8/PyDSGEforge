model:
  name: SmallOpenEconomyNK
  source: configs/open_economy_nk.yaml
  variables:
    states: [x_t, pi_t, i_t, q_t, rn_t, u_t, m_t]
    leads: [x_tp1, pi_tp1]
    lags: [x_tm1, pi_tm1, i_tm1, q_tm1, rn_tm1, u_tm1, m_tm1]
    shocks: [eps_q, eps_r, eps_u, eps_m]
  equations:
    - "x_t = 0.65 * x_tm1 + 0.35 * x_tp1 - (1 / 1.3) * (i_t - pi_tp1 - rn_t) + 0.08 * q_t"
    - "pi_t = 0.25 * pi_tm1 + 0.99 * 0.75 * pi_tp1 + 0.10 * x_t + 0.04 * q_t + u_t"
    - "i_t = rho_i * i_tm1 + (1 - rho_i) * (phi_pi * pi_t + phi_x * x_t + phi_q * q_t) + m_t"
    - "q_t = rho_q * q_tm1 - 0.20 * (i_t - pi_tp1 - rn_t) + eps_q"
    - "rn_t = rho_r * rn_tm1 + eps_r"
    - "u_t = rho_u * u_tm1 + eps_u"
    - "m_t = rho_m * m_tm1 + eps_m"

parameters:
  specs:
    rho_i:
      transform: logistic
      bounds: {lower: 0.30, upper: 0.98}
      prior: {family: beta, params: {a: 8.0, b: 2.0}}
    phi_pi:
      transform: exp
      bounds: {lower: 1.01, upper: 3.00}
      prior: {family: gamma, params: {a: 25.0, scale: 0.064}}
    phi_x:
      transform: exp
      bounds: {lower: 0.01, upper: 0.80}
      prior: {family: gamma, params: {a: 4.0, scale: 0.05}}
    phi_q:
      transform: exp
      bounds: {lower: 0.005, upper: 0.50}
      prior: {family: gamma, params: {a: 3.0, scale: 0.0333333333}}
    rho_q:
      transform: logistic
      bounds: {lower: 0.10, upper: 0.98}
      prior: {family: beta, params: {a: 7.0, b: 3.0}}
    rho_r:
      transform: logistic
      bounds: {lower: 0.20, upper: 0.99}
      prior: {family: beta, params: {a: 8.0, b: 2.0}}
    rho_u:
      transform: logistic
      bounds: {lower: 0.05, upper: 0.95}
      prior: {family: beta, params: {a: 5.0, b: 4.0}}
    rho_m:
      transform: logistic
      bounds: {lower: 0.01, upper: 0.90}
      prior: {family: beta, params: {a: 3.0, b: 6.0}}
    sig_q:
      transform: exp
      role: shock_std
      bounds: {lower: 0.01, upper: 0.50}
      prior: {family: gamma, params: {a: 4.0, scale: 0.030}}
    sig_r:
      transform: exp
      role: shock_std
      bounds: {lower: 0.01, upper: 0.50}
      prior: {family: gamma, params: {a: 4.0, scale: 0.035}}
    sig_u:
      transform: exp
      role: shock_std
      bounds: {lower: 0.01, upper: 0.40}
      prior: {family: gamma, params: {a: 4.0, scale: 0.025}}
    sig_m:
      transform: exp
      role: shock_std
      bounds: {lower: 0.005, upper: 0.30}
      prior: {family: gamma, params: {a: 4.0, scale: 0.0175}}
  theta_econ:
    rho_i: 0.80
    phi_pi: 1.60
    phi_x: 0.20
    phi_q: 0.10
    rho_q: 0.70
    rho_r: 0.80
    rho_u: 0.55
    rho_m: 0.30
    sig_q: 0.12
    sig_r: 0.14
    sig_u: 0.10
    sig_m: 0.07

q:
  diag_params: [sig_q, sig_r, sig_u, sig_m]

h:
  fixed:
    - [0.0004, 0, 0, 0, 0, 0, 0]
    - [0, 0.0004, 0, 0, 0, 0, 0]
    - [0, 0, 0.0004, 0, 0, 0, 0]
    - [0, 0, 0, 0.0004, 0, 0, 0]
    - [0, 0, 0, 0, 0.0001, 0, 0]
    - [0, 0, 0, 0, 0, 0.0001, 0]
    - [0, 0, 0, 0, 0, 0, 0.0001]

data:
  path: data/open_economy_nk_synthetic.csv
  columns: [x, pi, i, q, natural_rate, cost_push, monetary]

steady: {enabled: false}
solver: {div: 1.000001}
likelihood: {initial_covariance: stationary, diffuse_scale: 1000000.0}
map:
  enabled: true
  method: L-BFGS-B
  bounds: auto
  include_jacobian_prior: false
  hess_step: 0.0001
  tau_scale: 0.25
  hessian_strategy: auto
mcmc:
  enabled: true
  draws: 2500
  include_jacobian_prior: true
  adapt: true
  warmup: 1000
  adapt_block: 250
  low: 0.15
  high: 0.35
  shrink: 0.5
  expand: 1.5
  logs: true
  log_every: 500
irf:
  enabled: true
  horizon: 24
  quantiles: [0.16, 0.5, 0.84]
  shock_scale: std

