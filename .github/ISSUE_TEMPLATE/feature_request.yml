name: Feature request
description: Propose a model, API, solver, inference, or documentation improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: use_case
    attributes:
      label: Research or user need
      description: What workflow is currently difficult or impossible?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed interface
      description: Show the desired Python or YAML interface when possible.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation strategy
      description: How could the feature be tested against theory, synthetic data, or another implementation?
